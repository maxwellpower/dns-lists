name: Update DNS Lists

on:
  workflow_dispatch:
  schedule:
    - cron: "23 7 * * 1"

permissions:
  contents: write

concurrency:
  group: update-dns-lists
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Regenerate managed O365 allowlists
        run: python scripts/generate_o365_lists.py

      - name: Validate tracked allowlists
        run: python scripts/generate_o365_lists.py --validate-only

      - name: Commit changes if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/m365-endpoint-metadata.json o365/*.txt
          git diff --cached --quiet && exit 0
          git commit -m "Update managed O365 DNS lists"
          git push
